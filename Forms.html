<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Forms</h1>
    <!--"submit_form.php"-->
    <form action="_self" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required placeholder="Ovdje unesite ime"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Ovdje unesite email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Ovdje unesite lozinku"><br><br>

        <!--Checkboxes-->
        <label>
            <input type="checkbox" name="newsletter" value="yes">
            <label for="newsletter">Subscribe to newsletter</label>
            <input type="checkbox" name="sports" value="yes">
            <label for="sports">I like sports</label>
        </label><br><br>

        <!--Radio buttons-->
        <label>
            <input type="radio" name="gender" value="female">
            Female
        </label><br>
        <label>
            <input type="radio" name="gender" value="male">
            Male
        </label><br><br>

        <!--select dropdown i textarea-->
        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="usa">United States</option>
            <option value="canada">Canada</option>
            <option value="uk">United Kingdom</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
